<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Syne" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

    <title>Thu's MIS3371 Assignments</title>
    <link rel="icon" type="image/x-icon" href="title-icon.png">

    <style>
      body {
        background-image: url("./index-background.jpg");
        background-repeat: no-repeat;
        background-position: center;
        background-size: cover;
        font-family: "Syne", sans-serif;
      }

      .container {
        width: 100%;
        padding-right: 15px;
        padding-left: 15px;
        margin-right: auto;
        margin-left: auto;
      }

      .image-container {
        text-align: center;
        width: 100%;
      }

      .links-container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 20px;
      }

      .link {
        min-width: 50% !important;
        width: 320px;
        text-align: center;
      }

      @media (min-width: 1200px) {
        .container {
          max-width: 1140px;
        }
      }

      @media (min-width: 992px) {
        .container {
          max-width: 960px;
        }
      }

      @media (min-width: 768px) {
        .container {
          max-width: 720px;
        }

        .link {
          width: 100%;
        }
      }

      @media (min-width: 576px) {
        .container {
          max-width: 540px;
        }
      }

      .custom-button {
        background-color: #efe4bdcc !important;
        color: #418da0ff !important;
        transition: all 0.25s ease;
      }

      .custom-button:hover {
        background-color: #f8afbeff !important;
        color: #418da0 !important;
        transform: scale(1.03);
      }
    </style>
  </head>

  <body class="w3-white">
    <div class="container">
      <div class="image-container">
        <img
          src="profile.png"
          class="w3-margin"
          alt="Raccoon"
          width="250"
          height="250"
          style="object-fit: cover; border-radius: 50%; margin-top: 40px;"
        />
        
        <div class="w3-text-white">
          <p class="w3-xxlarge" style="color:#EFE4BD; font-family:'Bebas Neue', sans-serif;"><strong>MIS3371 ASSIGNMENTS</strong></p>
        </div>

        <div class="links-container">
          <a
            href="homework1/patient-form.html"
            class="w3-button w3-large w3-round-xlarge custom-button link"
            >Patient Form</a
          >
          <a
            href="#"
            class="w3-button w3-large w3-round-xlarge custom-button link"
            >Homework 2 (Coming Soon)</a
          >
          <a
            href="#"
            class="w3-button w3-large w3-round-xlarge custom-button link"
            >Homework 3 (Coming Soon)</a
          >
          <a
            href="#"
            class="w3-button w3-large w3-round-xlarge custom-button link"
            >Homework 4 (Coming Soon)</a
          >
        </div>
      </div>
    </div>

    <footer class="w3-container w3-center w3-padding-48 w3-margin-top">
      <a
        class="w3-margin-bottom"
        href="#"
        title="If you see this, hope you're having a good day!"
      >
        <img
          src="./title-icon.png"
          width="50"
          height="50"
          alt="Thutaloo Corp"
        />
      </a>
    </footer>
  </body>
</html>
